services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: vipcam
      POSTGRES_PASSWORD: d08688ea560642be34fc15
      POSTGRES_DB: vipcam
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vipcam -d vipcam"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - vipcam

  db-init:
    image: pgvector/pgvector:pg16
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD: d08688ea560642be34fc15
    entrypoint: >
      sh -c "psql -h db -U vipcam -d vipcam -c 'CREATE EXTENSION IF NOT EXISTS vector;' && psql -h db -U vipcam -d vipcam -c 'CREATE EXTENSION IF NOT EXISTS \"uuid-ossp\";'"
    networks:
      - vipcam

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vipcam

  backend:
    image: vipcam-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://vipcam:d08688ea560642be34fc15@db:5432/vipcam
      REDIS_URL: redis://redis:6379/0
      CUDA_VISIBLE_DEVICES: "0"
      YOLO_MODEL_PATH: /models/yolov8x.pt
      YOLO_IMGSZ: "1280"
      YOLO_CONF: "0.5"
      INSIGHTFACE_MODEL_NAME: buffalo_l
      INSIGHTFACE_DET_SIZE: "640"
      HSEMOTION_MODEL_NAME: enet_b2_8
      FACE_MATCH_THRESHOLD: "0.6"
      FACE_QUALITY_MIN: "0.7"
      FACE_MAX_EMBEDDINGS_PER_PERSON: "5"
      EMOTION_EMA_ALPHA: "0.3"
      EMOTION_SHIFT_MIN_FRAMES: "3"
      PROCESSING_FPS_TARGET: "5"
      SCENE_CHANGE_THRESHOLD: "0.03"
      ENABLE_PIPELINE: "true"
      API_HOST: "0.0.0.0"
      API_PORT: "8000"
      JWT_SECRET: d08688ea560642be34fc15635b6e0b4613921c3a0653cb7e20fd4e9b96cd7cab
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: "1440"
      CORS_ORIGINS: '["https://v3.sensevip.ia.br"]'
      SNAPSHOT_DIR: /data/snapshots
      FACE_CROP_DIR: /data/face_crops
      MAX_SNAPSHOTS: "10000"
      CAMERA_1_NAME: "Salão Principal"
      CAMERA_1_URL: "rtsp://admin:14D3608ff1@192.168.15.181:8554/stream0"
      CAMERA_1_LOCATION: "Florianópolis - Santa Mônica"
      CAMERA_1_FPS: "5"
      CAMERA_2_NAME: "Recepção"
      CAMERA_2_URL: "rtsp://admin:senha@192.168.0.102:554/onvif1"
      CAMERA_2_LOCATION: "Florianópolis - Santa Mônica - Recepção"
      CAMERA_2_FPS: "3"
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - model_data:/models
      - app_data:/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - vipcam

  frontend:
    image: vipcam-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - backend
    networks:
      - vipcam

volumes:
  pgdata:
  redis_data:
  model_data:
  app_data:

networks:
  vipcam:
    driver: bridge
