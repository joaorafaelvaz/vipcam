services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vipcam

  db-init:
    image: pgvector/pgvector:pg16
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    entrypoint: >
      sh -c "psql -h db -U ${POSTGRES_USER} -d ${POSTGRES_DB} -c 'CREATE EXTENSION IF NOT EXISTS vector;' && psql -h db -U ${POSTGRES_USER} -d ${POSTGRES_DB} -c 'CREATE EXTENSION IF NOT EXISTS \"uuid-ossp\";'"
    networks:
      - vipcam

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vipcam

  backend:
    image: vipcam-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      CUDA_VISIBLE_DEVICES: ${CUDA_VISIBLE_DEVICES}
      YOLO_MODEL_PATH: ${YOLO_MODEL_PATH}
      YOLO_IMGSZ: ${YOLO_IMGSZ}
      YOLO_CONF: ${YOLO_CONF}
      INSIGHTFACE_MODEL_NAME: ${INSIGHTFACE_MODEL_NAME}
      INSIGHTFACE_DET_SIZE: ${INSIGHTFACE_DET_SIZE}
      HSEMOTION_MODEL_NAME: ${HSEMOTION_MODEL_NAME}
      FACE_MATCH_THRESHOLD: ${FACE_MATCH_THRESHOLD}
      FACE_QUALITY_MIN: ${FACE_QUALITY_MIN}
      FACE_MAX_EMBEDDINGS_PER_PERSON: ${FACE_MAX_EMBEDDINGS_PER_PERSON}
      EMOTION_EMA_ALPHA: ${EMOTION_EMA_ALPHA}
      EMOTION_SHIFT_MIN_FRAMES: ${EMOTION_SHIFT_MIN_FRAMES}
      PROCESSING_FPS_TARGET: ${PROCESSING_FPS_TARGET}
      SCENE_CHANGE_THRESHOLD: ${SCENE_CHANGE_THRESHOLD}
      ENABLE_PIPELINE: ${ENABLE_PIPELINE}
      API_HOST: "0.0.0.0"
      API_PORT: "8000"
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES}
      CORS_ORIGINS: ${CORS_ORIGINS}
      SNAPSHOT_DIR: ${SNAPSHOT_DIR}
      FACE_CROP_DIR: ${FACE_CROP_DIR}
      MAX_SNAPSHOTS: ${MAX_SNAPSHOTS}
      CAMERA_1_NAME: ${CAMERA_1_NAME}
      CAMERA_1_URL: ${CAMERA_1_URL}
      CAMERA_1_LOCATION: ${CAMERA_1_LOCATION}
      CAMERA_1_FPS: ${CAMERA_1_FPS}
      CAMERA_2_NAME: ${CAMERA_2_NAME}
      CAMERA_2_URL: ${CAMERA_2_URL}
      CAMERA_2_LOCATION: ${CAMERA_2_LOCATION}
      CAMERA_2_FPS: ${CAMERA_2_FPS}
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - model_data:/models
      - app_data:/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - vipcam

  frontend:
    image: vipcam-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - backend
    networks:
      - vipcam

volumes:
  pgdata:
  redis_data:
  model_data:
  app_data:

networks:
  vipcam:
    driver: bridge
