# /etc/nginx/sites-available/v3.sensevip.ia.br

upstream vipcam_frontend {
    server 127.0.0.1:3000;
}

upstream vipcam_backend {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    server_name v3.sensevip.ia.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name v3.sensevip.ia.br;

    # SSL — Certbot vai preencher automaticamente, ou configurar manualmente:
    ssl_certificate     /etc/letsencrypt/live/v3.sensevip.ia.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/v3.sensevip.ia.br/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    client_max_body_size 50M;

    # Backend API
    location /api/ {
        proxy_pass http://vipcam_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # Backend docs (Swagger)
    location /docs {
        proxy_pass http://vipcam_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /openapi.json {
        proxy_pass http://vipcam_backend;
        proxy_set_header Host $host;
    }

    # WebSocket
    location /ws/ {
        proxy_pass http://vipcam_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Frontend (tudo mais)
    location / {
        proxy_pass http://vipcam_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
